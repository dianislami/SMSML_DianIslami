global:
  scrape_interval:     15s   # Seberapa sering Prometheus scrape target
  evaluation_interval: 15s   # Seberapa sering rules dievaluasi

scrape_configs:
  # ── Prometheus self-monitoring ──────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ── ML Model Exporter ───────────────────────────────────
  - job_name: 'ml_model_exporter'
    static_configs:
      - targets: ['localhost:8000']
    metrics_path: /metrics
    scrape_interval: 10s

  # ── MLflow Tracking Server (opsional) ──────────────────
  - job_name: 'mlflow'
    static_configs:
      - targets: ['localhost:5000']
    scrape_interval: 30s
